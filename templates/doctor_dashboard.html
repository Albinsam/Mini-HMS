{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="card-title">Add New Availability</h4>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100">Create Slot</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <h3>My Schedule</h3>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Start Time</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for slot in slots %}
                <tr>
                    <td>{{ slot.start_time|date:"M d, Y - H:i" }}</td>
                    <td>
                        {% if slot.is_booked %}
                            <span class="badge bg-danger">Booked</span>
                        {% else %}
                            <span class="badge bg-success">Available</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
